<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&amp;family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#dae2fd",
              "surface-tint": "#adc6ff",
              "tertiary-fixed-dim": "#4edea3",
              "surface-container-low": "#131b2e",
              "outline": "#909097",
              "on-surface": "#dae2fd",
              "surface": "#0b1326",
              "tertiary-fixed": "#6ffbbe",
              "secondary-fixed-dim": "#bec6e0",
              "on-tertiary-container": "#009365",
              "surface-container-lowest": "#060e20",
              "inverse-surface": "#dae2fd",
              "on-background": "#dae2fd",
              "surface-dim": "#0b1326",
              "on-error-container": "#ffdad6",
              "on-secondary": "#283044",
              "surface-bright": "#31394d",
              "secondary": "#bec6e0",
              "on-tertiary-fixed": "#002113",
              "secondary-container": "#3f465c",
              "surface-container-high": "#222a3d",
              "on-secondary-fixed": "#131b2e",
              "surface-variant": "#2d3449",
              "inverse-primary": "#005ac2",
              "on-primary": "#002e6a",
              "on-error": "#690005",
              "on-surface-variant": "#c6c6cd",
              "on-secondary-container": "#adb4ce",
              "tertiary": "#4edea3",
              "error": "#ffb4ab",
              "on-primary-fixed-variant": "#004395",
              "background": "#0b1326",
              "on-tertiary-fixed-variant": "#005236",
              "primary-container": "#00163a",
              "error-container": "#93000a",
              "inverse-on-surface": "#283044",
              "on-tertiary": "#003824",
              "on-primary-container": "#357df1",
              "on-secondary-fixed-variant": "#3f465c",
              "primary": "#adc6ff",
              "surface-container": "#171f33",
              "primary-fixed-dim": "#adc6ff",
              "on-primary-fixed": "#001a42",
              "outline-variant": "#45464d",
              "surface-container-highest": "#2d3449",
              "primary-fixed": "#d8e2ff",
              "tertiary-container": "#001c10"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0b1326;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .mesh-gradient {
            background-image: 
                radial-gradient(at 0% 0%, rgba(53, 125, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(173, 198, 255, 0.1) 0px, transparent 50%);
        }
        .logo-glow {
            filter: blur(40px);
            background: radial-gradient(circle, rgba(173, 198, 255, 0.3) 0%, rgba(53, 125, 241, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface">
<!-- Splash Screen Container -->
<main class="relative flex flex-col items-center justify-between w-full h-screen min-h-screen bg-surface mesh-gradient overflow-hidden">
<!-- Top Visual Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-on-primary-container/10 rounded-full blur-[100px]"></div>
<!-- Spacer for centering layout -->
<div class="flex-1"></div>
<!-- Central Branding Section -->
<div class="relative flex flex-col items-center z-10">
<!-- Glow Effect behind Logo -->
<div class="absolute inset-0 logo-glow scale-[2.5] -z-10"></div>
<!-- App Logo: Industrial Shield Icon -->
<div class="relative w-[120px] h-[120px] flex items-center justify-center bg-gradient-to-br from-primary to-on-primary-container rounded-[2rem] shadow-[0px_20px_60px_rgba(0,46,106,0.6)] ring-1 ring-white/20">
<span class="material-symbols-outlined text-on-primary text-6xl" style="font-variation-settings: 'FILL' 1;">
                    shield_with_heart
                </span>
<!-- Abstract BLE/RFID Waves overlays -->
<div class="absolute inset-0 flex items-center justify-center opacity-40">
<span class="material-symbols-outlined text-on-primary text-8xl scale-125">
                        wifi_tethering
                    </span>
</div>
</div>
<!-- App Identity -->
<div class="mt-10 text-center">
<h1 class="font-headline text-[28px] font-extrabold tracking-tight text-white leading-none mb-3">
                    ToolTracker Pro
                </h1>
<p class="font-body text-sm font-medium tracking-wide text-outline uppercase tracking-[0.1em]">
                    RFID + BLE Hybrid Tracking
                </p>
</div>
</div>
<!-- Footer / Credits -->
<div class="flex-1 flex flex-col justify-end items-center pb-12 w-full px-8">
<div class="flex flex-col items-center space-y-4">
<!-- Loading Indicator (Industrial style) -->
<div class="w-12 h-[2px] bg-surface-container-highest rounded-full overflow-hidden">
<div class="w-1/2 h-full bg-primary rounded-full"></div>
</div>
<!-- Partnership Badge -->
<div class="flex items-center space-y-1 flex-col opacity-60">
<span class="font-label text-[10px] font-bold uppercase tracking-[0.15em] text-outline">
                        Powered by
                    </span>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">
                            bolt
                        </span>
<span class="font-headline text-xs font-bold text-on-surface tracking-tight">
                            Supabase
                        </span>
</div>
</div>
</div>
</div>
<!-- Decorative UI Elements (Mock status bar etc if mobile focus) -->
<div class="absolute top-0 left-0 w-full h-12 flex justify-between items-center px-8 pt-4 opacity-40">
<span class="text-xs font-bold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[14px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[14px]">wifi</span>
<span class="material-symbols-outlined text-[14px]">battery_very_low</span>
</div>
</div>
</main>
<!-- Global Layout Shell Filter (Suppressed as per Splash Screen Rule) -->
<!-- Navigation shell is hidden to prioritize the splash content canvas -->
</body></html>
